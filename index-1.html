// ── TAB 1: LIBRARY ───────────────────────────────────────────
function ExDetail({ex,mn,onBack}){
  const[step,setStep]=useState(0);const[showM,setShowM]=useState(false);
  const dc={Beginner:C.green,Intermediate:C.yellow,Advanced:C.orange};
  return(<div style={{padding:"16px"}}>
    <button onClick={onBack} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,padding:"8px 16px",borderRadius:"8px",cursor:"pointer",marginBottom:"16px",fontSize:"13px"}}>← Back</button>
    <div style={{background:C.card,borderRadius:"16px",padding:"20px",marginBottom:"12px",border:`1px solid ${C.border}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"6px"}}>
        <h2 style={{color:C.text,fontSize:"20px",fontWeight:800,margin:0}}>{ex.name}</h2>
        <span style={{background:dc[ex.difficulty]+"22",color:dc[ex.difficulty],padding:"4px 10px",borderRadius:"20px",fontSize:"11px",fontWeight:700}}>{ex.difficulty}</span>
      </div>
      <p style={{color:C.cyan,fontSize:"13px",margin:"4px 0"}}>🎯 {ex.target}</p>
      <p style={{color:C.muted,fontSize:"12px",margin:0}}>+ {ex.secondary}</p>
    </div>
    <MuscleModel mn={mn}/>
    <div style={{background:C.card,borderRadius:"16px",padding:"20px",marginBottom:"12px",border:`1px solid ${C.border}`}}>
      <h3 style={{color:C.text,fontSize:"15px",fontWeight:700,marginBottom:"14px"}}>📋 Instructions</h3>
      {ex.steps.map((s,i)=>(<div key={i} onClick={()=>setStep(i)} style={{display:"flex",gap:"12px",padding:"12px",borderRadius:"10px",marginBottom:"8px",cursor:"pointer",background:step===i?C.cyan+"18":"transparent",border:`1px solid ${step===i?C.cyan+"44":"transparent"}`}}>
        <span style={{background:step===i?C.cyan:C.border,color:step===i?C.bg:C.muted,borderRadius:"50%",width:"24px",height:"24px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:700,flexShrink:0}}>{i+1}</span>
        <span style={{color:step===i?C.text:C.muted,fontSize:"14px",lineHeight:1.5}}>{s}</span>
      </div>))}
    </div>
    <div style={{background:C.card,borderRadius:"16px",padding:"20px",border:`1px solid ${C.orange}44`}}>
      <div onClick={()=>setShowM(!showM)} style={{display:"flex",justifyContent:"space-between",cursor:"pointer"}}>
        <h3 style={{color:C.orange,fontSize:"15px",fontWeight:700,margin:0}}>⚠️ Common Mistakes</h3>
        <span style={{color:C.muted}}>{showM?"▲":"▼"}</span>
      </div>
      {showM&&ex.mistakes.map((m,i)=>(<div key={i} style={{display:"flex",gap:"8px",marginTop:"10px"}}><span style={{color:C.orange}}>✗</span><span style={{color:C.muted,fontSize:"14px"}}>{m}</span></div>))}
    </div>
  </div>);
}

function Tab1(){
  const[sm,setSm]=useState(null);const[se,setSe]=useState(null);

  return(<div style={{padding:"16px"}}>
    <h1 style={{color:C.text,fontSize:"24px",fontWeight:900,marginBottom:"4px"}}>Exercise Library</h1>
    <p style={{color:C.muted,fontSize:"13px",marginBottom:"20px"}}>Muscle group select karo</p>
    {!sm?(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
      {Object.entries(MUSCLES).map(([n,d])=>(<div key={n} onClick={()=>setSm(n)} style={{background:C.card,borderRadius:"14px",padding:"18px 16px",cursor:"pointer",border:`1px solid ${d.color}33`}}>
        <div style={{fontSize:"28px",marginBottom:"8px"}}>{d.icon}</div>
        <div style={{color:d.color,fontSize:"15px",fontWeight:700}}>{n}</div>
        <div style={{color:C.muted,fontSize:"12px",marginTop:"2px"}}>{d.exercises.length} exercises</div>
      </div>))}
    </div>):(<div>
      <button onClick={()=>setSm(null)} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,padding:"8px 16px",borderRadius:"8px",cursor:"pointer",marginBottom:"16px",fontSize:"13px"}}>← All Muscles</button>
      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"16px"}}>
        <span style={{fontSize:"28px"}}>{MUSCLES[sm].icon}</span>
        <h2 style={{color:MUSCLES[sm].color,fontSize:"20px",fontWeight:800,margin:0}}>{sm}</h2>
      </div>
      {MUSCLES[sm].exercises.map((ex,i)=>(<div key={i} onClick={()=>setSe(ex)} style={{background:C.card,borderRadius:"12px",padding:"16px",marginBottom:"10px",cursor:"pointer",border:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{color:C.text,fontSize:"15px",fontWeight:700}}>{ex.name}</div><div style={{color:C.muted,fontSize:"12px",marginTop:"3px"}}>🎯 {ex.target}</div></div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"4px"}}>
          <span style={{background:MUSCLES[sm].color+"22",color:MUSCLES[sm].color,padding:"3px 8px",borderRadius:"12px",fontSize:"11px",fontWeight:700}}>{ex.difficulty}</span>
          <span style={{color:C.muted,fontSize:"20px"}}>›</span>
        </div>
      </div>))}
    </div>)}
  </div>);
}

// ── TAB 2: WORKOUT (with localStorage) ──────────────────────
function Tab2(){
  const today=new Date().getDay();
  const ti=today===0?6:today-1;
  const[ad,setAd]=useState(ti);
  const tk=todayKey();

  // Load saved data
  const[done,setDone]=useState(()=>lsGet(`workout_sets_${tk}`,{}));
  const[wts,setWts]=useState(()=>lsGet(`workout_weights_${tk}`,{}));
  const[history]=useState(()=>lsGet("workout_history",{}));

  const dd=SCHEDULE[ad];
  const allEx=dd.workouts.flatMap(w=>w.exercises);
  const total=allEx.reduce((a,e)=>a+e.sets,0);
  const doneN=Object.values(done).filter(Boolean).length;
  const pct=total>0?Math.round((doneN/total)*100):0;

  function toggleSet(k){
    const nd={...done,[k]:!done[k]};
    setDone(nd);
    lsSet(`workout_sets_${tk}`,nd);
    // Save to history
    const hist=lsGet("workout_history",{});
    hist[tk]={day:dd.day,focus:dd.focus,pct:Math.round((Object.values(nd).filter(Boolean).length/total)*100),ts:Date.now()};
    lsSet("workout_history",hist);
    // Update streak
    updateStreak();
  }

  function updateWt(k,v){
    const nw={...wts,[k]:v};setWts(nw);lsSet(`workout_weights_${tk}`,nw);
  }

  function updateStreak(){
    const hist=lsGet("workout_history",{});
    const dates=Object.keys(hist).sort().reverse();
    let streak=0;
    const today2=new Date();
    for(let i=0;i<365;i++){
      const d=new Date(today2);d.setDate(d.getDate()-i);
      const k=d.toISOString().slice(0,10);
      if(hist[k]&&hist[k].pct>=60)streak++;
      else if(i>0)break;
    }
    lsSet("streak",streak);
  }

  return(<div style={{padding:"16px"}}>
    <h1 style={{color:C.text,fontSize:"24px",fontWeight:900,marginBottom:"16px"}}>Workout Plan</h1>
    <div style={{display:"flex",gap:"8px",marginBottom:"20px",overflowX:"auto",paddingBottom:"4px"}}>
      {SCHEDULE.map((d,i)=>(<button key={i} onClick={()=>setAd(i)} style={{background:ad===i?C.cyan:C.card,color:ad===i?C.bg:C.muted,border:`1px solid ${ad===i?C.cyan:C.border}`,borderRadius:"10px",padding:"8px 14px",cursor:"pointer",whiteSpace:"nowrap",fontWeight:ad===i?800:500,fontSize:"13px"}}>{d.day}</button>))}
    </div>
    <div style={{background:C.card,borderRadius:"14px",padding:"16px",marginBottom:"16px",border:`1px solid ${C.border}`}}>
      <h2 style={{color:C.text,fontSize:"18px",fontWeight:800,margin:"0 0 4px 0"}}>{dd.day} — {dd.focus}</h2>
      {total>0&&(<div style={{marginTop:"12px"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}>
          <span style={{color:C.muted,fontSize:"12px"}}>Progress</span>
          <span style={{color:pct===100?C.green:C.cyan,fontSize:"12px",fontWeight:700}}>{pct}% {pct===100?"✓ Done!":""}</span>
        </div>
        <div style={{background:C.border,borderRadius:"4px",height:"6px"}}><div style={{background:pct===100?C.green:C.cyan,height:"100%",borderRadius:"4px",width:`${pct}%`,transition:"width 0.3s"}}/></div>
      </div>)}
    </div>
    {dd.workouts.length===0?(<div style={{textAlign:"center",padding:"48px 24px"}}>
      <div style={{fontSize:"56px",marginBottom:"12px"}}>🧘</div>
      <div style={{color:C.text,fontSize:"18px",fontWeight:700}}>Recovery Day</div>
      <div style={{color:C.muted,fontSize:"14px",marginTop:"8px"}}>Rest, stretch, rebuild. You earned it! 💪</div>
    </div>):dd.workouts.map((g,gi)=>(<div key={gi} style={{marginBottom:"20px"}}>
      <h3 style={{color:C.cyan,fontSize:"13px",fontWeight:700,marginBottom:"10px",textTransform:"uppercase",letterSpacing:"1px"}}>— {g.muscle} —</h3>
      {g.exercises.map((ex,ei)=>(<div key={ei} style={{background:C.card,borderRadius:"12px",padding:"16px",marginBottom:"10px",border:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"12px"}}>
          <div><div style={{color:C.text,fontSize:"15px",fontWeight:700}}>{ex.name}</div><div style={{color:C.muted,fontSize:"12px"}}>{ex.sets} Sets × {ex.reps}</div></div>
          <input type="number" placeholder="kg" value={wts[`${gi}_${ei}`]||""} onChange={e=>updateWt(`${gi}_${ei}`,e.target.value)}
            style={{background:C.card2,border:`1px solid ${C.border}`,color:C.text,borderRadius:"8px",padding:"6px 8px",width:"60px",fontSize:"14px",textAlign:"center"}}/>
        </div>
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
          {Array.from({length:ex.sets}).map((_,si)=>{
            const k=`${gi}_${ei}_${si}`;const isDone=done[k];
            return(<button key={si} onClick={()=>toggleSet(k)} style={{background:isDone?C.green:C.card2,color:isDone?C.bg:C.muted,border:`1px solid ${isDone?C.green:C.border}`,borderRadius:"8px",padding:"7px 14px",cursor:"pointer",fontSize:"13px",fontWeight:700}}>
              {isDone?"✓ ":""}S{si+1}
            </button>);
          })}
        </div>
      </div>))}
    </div>))}
  </div>);
}

// ── TAB 3: STATS (with localStorage) ────────────────────────
function Tab3(){
  const streak=lsGet("streak",0);
  const history=lsGet("workout_history",{});
  const dates=Object.keys(history).sort().reverse();
  const thisMonth=dates.filter(d=>d.startsWith(new Date().toISOString().slice(0,7)));
  const totalW=thisMonth.length;
  const missedDays=new Date().getDate()-totalW;
  const avgScore=thisMonth.length>0?Math.round(thisMonth.reduce((a,d)=>a+(history[d].pct/100*10),0)/thisMonth.length*2.5):0;

  // Last 7 days for chart
  const last7=Array.from({length:7}).map((_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    const k=d.toISOString().slice(0,10);
    return{day:["S","M","T","W","T","F","S"][d.getDay()],score:history[k]?Math.round(history[k].pct/100*25):0,isToday:i===6};
  });

  const todayScore=last7[6].score;
  const{rank,label,color}=getRank(todayScore);
  const st=STREAKS.slice().reverse().find(s=>streak>=s.days)||STREAKS[0];

  return(<div style={{padding:"16px"}}>
    <h1 style={{color:C.text,fontSize:"24px",fontWeight:900,marginBottom:"20px"}}>Performance</h1>
    <div style={{background:`linear-gradient(135deg,${color}18,${C.card})`,borderRadius:"20px",padding:"24px",marginBottom:"16px",border:`1px solid ${color}44`,textAlign:"center"}}>
      <div style={{fontSize:"72px",fontWeight:900,color,lineHeight:1,textShadow:`0 0 40px ${color}66`}}>{rank}</div>
      <div style={{color:C.muted,fontSize:"12px",fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",marginTop:"2px"}}>RANK</div>
      <div style={{color:C.text,fontSize:"18px",fontWeight:700,marginTop:"8px"}}>{label}</div>
      <div style={{color:C.muted,fontSize:"14px",marginTop:"4px"}}>{todayScore} / 25 Points Today</div>
    </div>

    {/* Weekly chart - REAL DATA */}
    <div style={{background:C.card,borderRadius:"16px",padding:"16px",marginBottom:"16px",border:`1px solid ${C.border}`}}>
      <h3 style={{color:C.text,fontSize:"15px",fontWeight:700,marginBottom:"16px"}}>📈 Last 7 Days (Real Data)</h3>
      <div style={{display:"flex",alignItems:"flex-end",gap:"6px",height:"100px"}}>
        {last7.map((v,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"4px"}}>
          <span style={{color:C.muted,fontSize:"10px"}}>{v.score||""}</span>
          <div style={{width:"100%",background:v.isToday?C.cyan:v.score>0?C.cyan+"66":C.border,borderRadius:"4px 4px 0 0",height:`${Math.max((v.score/25)*80,4)}px`}}/>
          <span style={{color:v.isToday?C.cyan:C.muted,fontSize:"11px",fontWeight:v.isToday?700:400}}>{v.day}</span>
        </div>))}
      </div>
    </div>

    {/* Streak - REAL */}
    <div style={{background:C.card,borderRadius:"16px",padding:"16px",marginBottom:"16px",border:`1px solid ${st.color}44`}}>
      <h3 style={{color:C.text,fontSize:"15px",fontWeight:700,marginBottom:"12px"}}>🔥 Current Streak</h3>
      <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"14px"}}>
        <span style={{fontSize:"38px"}}>{st.icon}</span>
        <div>
          <div style={{color:st.color,fontSize:"26px",fontWeight:900}}>{streak} Days</div>
          <div style={{color:C.muted,fontSize:"13px"}}>{st.label} Streak</div>
        </div>
      </div>
      <div style={{display:"flex",gap:"6px"}}>
        {STREAKS.map((s,i)=>(<div key={i} style={{flex:1,textAlign:"center",opacity:streak>=s.days?1:0.3}}>
          <div style={{fontSize:"20px"}}>{s.icon}</div>
          <div style={{color:s.color,fontSize:"10px",fontWeight:700,marginTop:"2px"}}>{s.days}d</div>
        </div>))}
      </div>
    </div>

    {/* Monthly - REAL */}
    <div style={{background:C.card,borderRadius:"16px",padding:"16px",marginBottom:"16px",border:`1px solid ${C.border}`}}>
      <h3 style={{color:C.text,fontSize:"15px",fontWeight:700,marginBottom:"12px"}}>📅 This Month (Real)</h3>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px"}}>
        {[{label:"Workouts",v:totalW,i:"💪"},{label:"Missed",v:Math.max(0,missedDays),i:"❌"},{label:"Avg Score",v:avgScore,i:"⭐"},{label:"Streak",v:`${streak}d`,i:"🔥"},{label:"Best Rank",v:totalW>0?"A":"—",i:"🏆"},{label:"Days Done",v:`${totalW}/${new Date().getDate()}`,i:"📊"}].map((s,i)=>(<div key={i} style={{background:C.card2,borderRadius:"10px",padding:"12px 8px",textAlign:"center"}}>
          <div style={{fontSize:"20px",marginBottom:"4px"}}>{s.i}</div>
          <div style={{color:C.text,fontSize:"13px",fontWeight:700}}>{s.v}</div>
          <div style={{color:C.muted,fontSize:"10px",marginTop:"2px"}}>{s.label}</div>
        </div>))}
      </div>
    </div>

    {/* Workout History */}
    {dates.length>0&&(<div style={{background:C.card,borderRadius:"16px",padding:"16px",border:`1px solid ${C.border}`}}>
      <h3 style={{color:C.text,fontSize:"15px",fontWeight:700,marginBottom:"12px"}}>📋 Recent Workouts</h3>
      {dates.slice(0,7).map((d,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:i<6?`1px solid ${C.border}`:"none"}}>
        <div>
          <div style={{color:C.text,fontSize:"13px",fontWeight:600}}>{history[d].focus}</div>
          <div style={{color:C.muted,fontSize:"11px"}}>{d}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{color:history[d].pct>=80?C.green:history[d].pct>=60?C.yellow:C.orange,fontSize:"14px",fontWeight:700}}>{history[d].pct}%</div>
          <div style={{color:C.muted,fontSize:"10px"}}>{getRank(Math.round(history[d].pct/100*25)).rank} Rank</div>
        </div>
      </div>))}
    </div>)}
  </div>);
}

// ── TAB 4: DIET (with localStorage) ─────────────────────────
function Tab4(){
  const tk=todayKey();
  const[ckd,setCkd]=useState(()=>lsGet(`diet_${tk}`,{}));
  const[weight,setWeight]=useState(()=>lsGet("bodyweight",""));
  const[ai,setAi]=useState("");const[load,setLoad]=useState(false);

  const cm=DIET.filter(d=>ckd[d.meal]);
  const cal=cm.reduce((a,d)=>a+d.cal,0);
  const prot=cm.reduce((a,d)=>a+d.protein,0);

  function toggleMeal(meal){
    const nd={...ckd,[meal]:!ckd[meal]};
    setCkd(nd);lsSet(`diet_${tk}`,nd);
    // Save daily calories to history
    const ch=lsGet("cal_history",{});
    const nc=DIET.filter(d=>nd[d.meal]).reduce((a,d)=>a+d.cal,0);
    ch[tk]=nc;lsSet("cal_history",ch);
  }

  function saveWeight(v){
    setWeight(v);lsSet("bodyweight",v);
    const wh=lsGet("weight_history",{});
    wh[tk]=parseFloat(v);lsSet("weight_history",wh);
  }

  async function getCoach(){
    setLoad(true);setAi("");
    try{
      const st=DIET.map(d=>`${d.meal}:${ckd[d.meal]?"Done":"Missed"}`).join(", ");
      const streak=lsGet("streak",0);
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:`You are FitWarrior AI Coach. Punchy motivating daily report (3-4 sentences) for:\n- Meals: ${cm.length}/8\n- Calories: ${cal}/2800 kcal\n- Protein: ${prot}/110g\n- Status: ${st}\n- Streak: ${streak} days\nBe specific energetic. ONE tip for tomorrow. Max 80 words. 1-2 emojis.`}]})});
      const data=await r.json();
      setAi(data.content?.[0]?.text||"Solid effort! Stay consistent. 💪");
    }catch{setAi("Solid effort! Stay consistent and keep pushing. 💪");}
    setLoad(false);
  }

  return(<div style={{padding:"16px"}}>
    <h1 style={{color:C.text,fontSize:"24px",fontWeight:900,marginBottom:"4px"}}>Diet Planner</h1>
    <p style={{color:C.muted,fontSize:"13px",marginBottom:"16px"}}>Pure Veg · 2800 cal target · 110g protein</p>

    {/* Weight tracker */}
    <div style={{background:C.card,borderRadius:"14px",padding:"16px",marginBottom:"16px",border:`1px solid ${C.purple}44`,display:"flex",alignItems:"center",gap:"12px"}}>
      <span style={{fontSize:"28px"}}>⚖️</span>
      <div style={{flex:1}}>
        <div style={{color:C.text,fontSize:"14px",fontWeight:700}}>Aaj ka Weight</div>
        <div style={{color:C.muted,fontSize:"12px"}}>Daily log karo progress track hoga</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
        <input type="number" placeholder="50" value={weight} onChange={e=>saveWeight(e.target.value)}
          style={{background:C.card2,border:`1px solid ${C.purple}`,color:C.text,borderRadius:"8px",padding:"8px",width:"64px",fontSize:"16px",textAlign:"center",fontWeight:700}}/>
        <span style={{color:C.muted,fontSize:"13px"}}>kg</span>
      </div>
    </div>

    {/* Macros */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"16px"}}>
      {[{label:"Calories",v:cal,t:2800,u:"kcal",c:C.orange},{label:"Protein",v:prot,t:110,u:"g",c:C.cyan}].map((m,i)=>(<div key={i} style={{background:C.card,borderRadius:"14px",padding:"16px",border:`1px solid ${m.c}33`}}>
        <div style={{color:m.c,fontSize:"24px",fontWeight:900}}>{m.v}</div>
        <div style={{color:C.muted,fontSize:"12px"}}>/ {m.t} {m.u}</div>
        <div style={{background:C.border,borderRadius:"4px",height:"4px",marginTop:"8px"}}>
          <div style={{background:m.c,height:"100%",borderRadius:"4px",width:`${Math.min((m.v/m.t)*100,100)}%`,transition:"width 0.3s"}}/>
        </div>
      </div>))}
    </div>

    {/* Meal list */}
    {DIET.map((meal,i)=>(<div key={i} onClick={()=>toggleMeal(meal.meal)} style={{background:ckd[meal.meal]?C.green+"12":C.card,border:`1px solid ${ckd[meal.meal]?C.green+"44":C.border}`,borderRadius:"14px",padding:"14px 16px",marginBottom:"10px",cursor:"pointer",transition:"all 0.2s"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>
          <span style={{fontSize:"22px"}}>{meal.icon}</span>
          <div>
            <div style={{color:C.text,fontSize:"15px",fontWeight:700}}>{meal.meal}</div>
            <div style={{color:C.muted,fontSize:"11px",marginBottom:"4px"}}>{meal.time}</div>
            {meal.items.map((item,j)=><div key={j} style={{color:C.muted,fontSize:"12px"}}>• {item}</div>)}
          </div>
        </div>
        <div style={{textAlign:"right",flexShrink:0,marginLeft:"8px"}}>
          <div style={{color:ckd[meal.meal]?C.green:C.border,fontSize:"22px",marginBottom:"4px"}}>{ckd[meal.meal]?"✓":"○"}</div>
          {meal.cal>0&&<div style={{color:C.orange,fontSize:"12px",fontWeight:700}}>{meal.cal} cal</div>}
          {meal.protein>0&&<div style={{color:C.cyan,fontSize:"11px"}}>{meal.protein}g</div>}
          <span style={{background:C.cyan+"22",color:C.cyan,padding:"2px 6px",borderRadius:"8px",fontSize:"10px",fontWeight:700}}>{meal.tag}</span>
        </div>
      </div>
    </div>))}

    {/* AI Coach */}
    <div style={{background:`linear-gradient(135deg,${C.purple}18,${C.card})`,borderRadius:"16px",padding:"20px",marginTop:"8px",marginBottom:"8px",border:`1px solid ${C.purple}44`}}>
      <h3 style={{color:C.purple,fontSize:"15px",fontWeight:700,marginBottom:"12px"}}>🤖 AI Coach Report</h3>
      {ai?<p style={{color:C.text,fontSize:"14px",lineHeight:1.6,margin:"0 0 12px 0"}}>{ai}</p>
        :<p style={{color:C.muted,fontSize:"13px",margin:"0 0 12px 0"}}>Meals log karo phir AI coach report lo.</p>}
      <button onClick={getCoach} disabled={load} style={{background:load?C.border:C.purple,color:load?C.muted:"#fff",border:"none",borderRadius:"10px",padding:"12px 20px",cursor:load?"not-allowed":"pointer",fontSize:"14px",fontWeight:700,width:"100%"}}>
        {load?"Analyzing...":"📊 Get AI Coach Report"}
      </button>
    </div>
  </div>);
}

        <span style={{fontSize:"22px"}}>⚔️</span>

      {tabs.map((t,i)=>(<button key={i} onClick={()=>setTab(i)} style={{flex:1,background:"none",border:"none",padding:"10px 0 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}>
        <span style={{fontSize:"20px"}}>{t.icon}</span>

}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
