const blob = new Blob([JSON.stringify(manifestData)],{type:"application/json"});
const manifestURL = URL.createObjectURL(blob);
const link = document.createElement("link");
link.rel = "manifest"; link.href = manifestURL;
document.head.appendChild(link);
</script>

function getRank(s){
  if(s>=23)return{rank:"S",label:"Excellent",color:C.cyan};
  if(s>=20)return{rank:"A",label:"Very Good",color:C.green};
  if(s>=15)return{rank:"B",label:"Good",color:C.yellow};
  if(s>=10)return{rank:"C",label:"Needs Improvement",color:C.orange};
  return{rank:"D",label:"Poor",color:"#FF4444"};
}

function ExDetail({ex,mname,onBack}){
  const[step,setStep]=useState(0);
  const[showM,setShowM]=useState(false);
  const dc={Beginner:C.green,Intermediate:C.yellow,Advanced:C.orange};
  return(
    <div style={{padding:"16px"}}>
      <button onClick={onBack} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,padding:"8px 16px",borderRadius:"8px",cursor:"pointer",marginBottom:"16px",fontSize:"13px"}}>← Back</button>
      <div style={{background:C.card,borderRadius:"16px",padding:"20px",marginBottom:"12px",border:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"6px"}}>
          <h2 style={{color:C.text,fontSize:"20px",fontWeight:800,margin:0}}>{ex.name}</h2>
          <span style={{background:dc[ex.difficulty]+"22",color:dc[ex.difficulty],padding:"4px 10px",borderRadius:"20px",fontSize:"11px",fontWeight:700}}>{ex.difficulty}</span>
        </div>
        <p style={{color:C.cyan,fontSize:"13px",margin:"4px 0"}}>🎯 {ex.target}</p>
        <p style={{color:C.muted,fontSize:"12px",margin:0}}>+ {ex.secondary}</p>
      </div>
      <MuscleModel muscleName={mname}/>
      <div style={{background:C.card,borderRadius:"16px",padding:"20px",marginBottom:"12px",border:`1px solid ${C.border}`}}>
        <h3 style={{color:C.text,fontSize:"15px",fontWeight:700,marginBottom:"14px"}}>📋 Instructions</h3>
        {ex.steps.map((s,i)=>(
          <div key={i} onClick={()=>setStep(i)} style={{display:"flex",gap:"12px",padding:"12px",borderRadius:"10px",marginBottom:"8px",cursor:"pointer",background:step===i?C.cyan+"18":"transparent",border:`1px solid ${step===i?C.cyan+"44":"transparent"}`}}>
            <span style={{background:step===i?C.cyan:C.border,color:step===i?C.bg:C.muted,borderRadius:"50%",width:"24px",height:"24px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:700,flexShrink:0}}>{i+1}</span>
            <span style={{color:step===i?C.text:C.muted,fontSize:"14px",lineHeight:1.5}}>{s}</span>
          </div>
        ))}
      </div>
      <div style={{background:C.card,borderRadius:"16px",padding:"20px",border:`1px solid ${C.orange}44`}}>
        <div onClick={()=>setShowM(!showM)} style={{display:"flex",justifyContent:"space-between",cursor:"pointer"}}>
          <h3 style={{color:C.orange,fontSize:"15px",fontWeight:700,margin:0}}>⚠️ Common Mistakes</h3>
          <span style={{color:C.muted}}>{showM?"▲":"▼"}</span>
        </div>
        {showM&&ex.mistakes.map((m,i)=>(
          <div key={i} style={{display:"flex",gap:"8px",marginTop:"10px"}}>
            <span style={{color:C.orange}}>✗</span>
            <span style={{color:C.muted,fontSize:"14px"}}>{m}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

      {!sm?(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
          {Object.entries(MUSCLES).map(([n,d])=>(
            <div key={n} onClick={()=>setSm(n)} style={{background:C.card,borderRadius:"14px",padding:"18px 16px",cursor:"pointer",border:`1px solid ${d.color}33`}}>
              <div style={{fontSize:"28px",marginBottom:"8px"}}>{d.icon}</div>
              <div style={{color:d.color,fontSize:"15px",fontWeight:700}}>{n}</div>
              <div style={{color:C.muted,fontSize:"12px",marginTop:"2px"}}>{d.exercises.length} exercises</div>
            </div>
          ))}
        </div>
      ):(
        <div>
          <button onClick={()=>setSm(null)} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,padding:"8px 16px",borderRadius:"8px",cursor:"pointer",marginBottom:"16px",fontSize:"13px"}}>← All Muscles</button>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"16px"}}>
            <span style={{fontSize:"28px"}}>{MUSCLES[sm].icon}</span>
            <h2 style={{color:MUSCLES[sm].color,fontSize:"20px",fontWeight:800,margin:0}}>{sm}</h2>
          </div>
          {MUSCLES[sm].exercises.map((ex,i)=>(
            <div key={i} onClick={()=>setSe(ex)} style={{background:C.card,borderRadius:"12px",padding:"16px",marginBottom:"10px",cursor:"pointer",border:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{color:C.text,fontSize:"15px",fontWeight:700}}>{ex.name}</div>
                <div style={{color:C.muted,fontSize:"12px",marginTop:"3px"}}>🎯 {ex.target}</div>

              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"4px"}}>

                <span style={{color:C.muted,fontSize:"20px"}}>›</span>

            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Tab2(){
  const today=new Date().getDay();
  const ti=today===0?6:today-1;
  const[ad,setAd]=useState(ti);
  const[done,setDone]=useState({});
  const[wts,setWts]=useState({});
  const dd=SCHEDULE[ad];
  const allEx=dd.workouts.flatMap(w=>w.exercises);
  const total=allEx.reduce((a,e)=>a+e.sets,0);
  const doneN=Object.values(done).filter(Boolean).length;
  const pct=total>0?Math.round((doneN/total)*100):0;
  return(
    <div style={{padding:"16px"}}>
      <h1 style={{color:C.text,fontSize:"24px",fontWeight:900,marginBottom:"16px"}}>Workout Plan</h1>
      <div style={{display:"flex",gap:"8px",marginBottom:"20px",overflowX:"auto",paddingBottom:"4px"}}>
        {SCHEDULE.map((d,i)=>(
          <button key={i} onClick={()=>{setAd(i);setDone({});}} style={{background:ad===i?C.cyan:C.card,color:ad===i?C.bg:C.muted,border:`1px solid ${ad===i?C.cyan:C.border}`,borderRadius:"10px",padding:"8px 14px",cursor:"pointer",whiteSpace:"nowrap",fontWeight:ad===i?800:500,fontSize:"13px"}}>{d.day}</button>
        ))}
      </div>
      <div style={{background:C.card,borderRadius:"14px",padding:"16px",marginBottom:"16px",border:`1px solid ${C.border}`}}>
        <h2 style={{color:C.text,fontSize:"18px",fontWeight:800,margin:"0 0 4px 0"}}>{dd.day} — {dd.focus}</h2>
        {total>0&&(
          <div style={{marginTop:"12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}>
              <span style={{color:C.muted,fontSize:"12px"}}>Progress</span>
              <span style={{color:pct===100?C.green:C.cyan,fontSize:"12px",fontWeight:700}}>{pct}% {pct===100?"✓ Done!":""}</span>
            </div>
            <div style={{background:C.border,borderRadius:"4px",height:"6px"}}>
              <div style={{background:pct===100?C.green:C.cyan,height:"100%",borderRadius:"4px",width:`${pct}%`,transition:"width 0.3s"}}/>
            </div>
          </div>
        )}
      </div>
      {dd.workouts.length===0?(
        <div style={{textAlign:"center",padding:"48px 24px"}}>
          <div style={{fontSize:"56px",marginBottom:"12px"}}>🧘</div>
          <div style={{color:C.text,fontSize:"18px",fontWeight:700}}>Recovery Day</div>
          <div style={{color:C.muted,fontSize:"14px",marginTop:"8px",lineHeight:1.6}}>Rest, stretch, rebuild. You earned it! 💪</div>
        </div>
      ):dd.workouts.map((g,gi)=>(
        <div key={gi} style={{marginBottom:"20px"}}>
          <h3 style={{color:C.cyan,fontSize:"13px",fontWeight:700,marginBottom:"10px",textTransform:"uppercase",letterSpacing:"1px"}}>— {g.muscle} —</h3>
          {g.exercises.map((ex,ei)=>(
            <div key={ei} style={{background:C.card,borderRadius:"12px",padding:"16px",marginBottom:"10px",border:`1px solid ${C.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"12px"}}>
                <div>
                  <div style={{color:C.text,fontSize:"15px",fontWeight:700}}>{ex.name}</div>
                  <div style={{color:C.muted,fontSize:"12px"}}>{ex.sets} Sets × {ex.reps}</div>
                </div>
                <input type="number" placeholder="kg" value={wts[`${gi}_${ei}`]||""} onChange={e=>setWts(p=>({...p,[`${gi}_${ei}`]:e.target.value}))}
                  style={{background:C.card2,border:`1px solid ${C.border}`,color:C.text,borderRadius:"8px",padding:"6px 8px",width:"60px",fontSize:"14px",textAlign:"center"}}/>
              </div>
              <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                {Array.from({length:ex.sets}).map((_,si)=>{
                  const k=`${gi}_${ei}_${si}`;
                  const isDone=done[k];
                  return(
                    <button key={si} onClick={()=>setDone(p=>({...p,[k]:!p[k]}))} style={{background:isDone?C.green:C.card2,color:isDone?C.bg:C.muted,border:`1px solid ${isDone?C.green:C.border}`,borderRadius:"8px",padding:"7px 14px",cursor:"pointer",fontSize:"13px",fontWeight:700}}>
                      {isDone?"✓ S":"S"}{si+1}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

      <div style={{background:C.card,borderRadius:"16px",padding:"16px",border:`1px solid ${C.border}`}}>
        <h3 style={{color:C.text,fontSize:"15px",fontWeight:700,marginBottom:"12px"}}>📅 This Month</h3>

function Tab4(){
  const[ckd,setCkd]=useState({});
  const[ai,setAi]=useState("");
  const[load,setLoad]=useState(false);
  const cm=DIET.filter(d=>ckd[d.meal]);
  const cal=cm.reduce((a,d)=>a+d.cal,0);
  const prot=cm.reduce((a,d)=>a+d.protein,0);

  async function getCoach(){
    setLoad(true);setAi("");
    try{
      const st=DIET.map(d=>`${d.meal}:${ckd[d.meal]?"Done":"Missed"}`).join(", ");
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:`You are FitWarrior AI Coach. Give a punchy motivating daily report (3-4 sentences max) for:\n- Meals done: ${cm.length}/8\n- Calories: ${cal}/2800 kcal\n- Protein: ${prot}/110g\n- Meal status: ${st}\nBe specific, energetic. ONE actionable tip for tomorrow. Max 80 words. 1-2 emojis.`}]})
      });
      const data=await r.json();
      setAi(data.content?.[0]?.text||"Solid effort today! Stay consistent and keep pushing. 💪");
    }catch{setAi("Solid effort today! Stay consistent and keep pushing. 💪");}
    setLoad(false);
  }

  return(
    <div style={{padding:"16px"}}>
      <h1 style={{color:C.text,fontSize:"24px",fontWeight:900,marginBottom:"4px"}}>Diet Planner</h1>
      <p style={{color:C.muted,fontSize:"13px",marginBottom:"16px"}}>50kg · Pure Veg · 2800 cal target</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"16px"}}>
        {[{label:"Calories",v:cal,t:2800,u:"kcal",c:C.orange},{label:"Protein",v:prot,t:110,u:"g",c:C.cyan}].map((m,i)=>(
          <div key={i} style={{background:C.card,borderRadius:"14px",padding:"16px",border:`1px solid ${m.c}33`}}>
            <div style={{color:m.c,fontSize:"24px",fontWeight:900}}>{m.v}</div>
            <div style={{color:C.muted,fontSize:"12px"}}>/ {m.t} {m.u}</div>
            <div style={{background:C.border,borderRadius:"4px",height:"4px",marginTop:"8px"}}>
              <div style={{background:m.c,height:"100%",borderRadius:"4px",width:`${Math.min((m.v/m.t)*100,100)}%`,transition:"width 0.3s"}}/>
            </div>
          </div>
        ))}
      </div>
      {DIET.map((meal,i)=>(
        <div key={i} onClick={()=>setCkd(p=>({...p,[meal.meal]:!p[meal.meal]}))} style={{background:ckd[meal.meal]?C.green+"12":C.card,border:`1px solid ${ckd[meal.meal]?C.green+"44":C.border}`,borderRadius:"14px",padding:"14px 16px",marginBottom:"10px",cursor:"pointer",transition:"all 0.2s"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>
              <span style={{fontSize:"22px"}}>{meal.icon}</span>
              <div>
                <div style={{color:C.text,fontSize:"15px",fontWeight:700}}>{meal.meal}</div>
                <div style={{color:C.muted,fontSize:"11px",marginBottom:"4px"}}>{meal.time}</div>
                {meal.items.map((item,j)=><div key={j} style={{color:C.muted,fontSize:"12px"}}>• {item}</div>)}
              </div>
            </div>
            <div style={{textAlign:"right",flexShrink:0,marginLeft:"8px"}}>
              <div style={{color:ckd[meal.meal]?C.green:C.border,fontSize:"22px",marginBottom:"4px"}}>{ckd[meal.meal]?"✓":"○"}</div>
              {meal.cal>0&&<div style={{color:C.orange,fontSize:"12px",fontWeight:700}}>{meal.cal} cal</div>}
              {meal.protein>0&&<div style={{color:C.cyan,fontSize:"11px"}}>{meal.protein}g</div>}
              <span style={{background:C.cyan+"22",color:C.cyan,padding:"2px 6px",borderRadius:"8px",fontSize:"10px",fontWeight:700}}>{meal.tag}</span>
            </div>
          </div>
        </div>
      ))}
      <div style={{background:`linear-gradient(135deg,${C.purple}18,${C.card})`,borderRadius:"16px",padding:"20px",marginTop:"8px",marginBottom:"8px",border:`1px solid ${C.purple}44`}}>
        <h3 style={{color:C.purple,fontSize:"15px",fontWeight:700,marginBottom:"12px"}}>🤖 AI Coach Report</h3>
        {ai?<p style={{color:C.text,fontSize:"14px",lineHeight:1.6,margin:"0 0 12px 0"}}>{ai}</p>
          :<p style={{color:C.muted,fontSize:"13px",margin:"0 0 12px 0"}}>Meals log karo phir AI coach report lo.</p>}
        <button onClick={getCoach} disabled={load} style={{background:load?C.border:C.purple,color:load?C.muted:"#fff",border:"none",borderRadius:"10px",padding:"12px 20px",cursor:load?"not-allowed":"pointer",fontSize:"14px",fontWeight:700,width:"100%"}}>
          {load?"Analyzing...":"📊 Get AI Coach Report"}
        </button>
      </div>
    </div>
  );
}

function App(){
  const[tab,setTab]=useState(0);
  const tabs=[{icon:"🏛️",label:"Library"},{icon:"💪",label:"Workout"},{icon:"📊",label:"Stats"},{icon:"🥗",label:"Diet"}];
  return(
    <div style={{background:C.bg,minHeight:"100vh",maxWidth:"480px",margin:"0 auto",position:"relative",paddingBottom:"80px"}}>
      <div style={{background:C.bg,borderBottom:`1px solid ${C.border}`,padding:"14px 16px 10px",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
          <span style={{fontSize:"22px"}}>⚔️</span>
          <span style={{color:C.cyan,fontSize:"18px",fontWeight:900}}>FitWarrior<span style={{color:C.orange}}>AI</span></span>
          <span style={{marginLeft:"auto",background:C.cyan+"18",color:C.cyan,padding:"3px 10px",borderRadius:"20px",fontSize:"11px",fontWeight:700}}>WARRIOR</span>
        </div>
      </div>
      {tab===0&&<Tab1/>}
      {tab===1&&<Tab2/>}
      {tab===2&&<Tab3/>}
      {tab===3&&<Tab4/>}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:C.card,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:20}}>
        {tabs.map((t,i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{flex:1,background:"none",border:"none",padding:"10px 0 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}>
            <span style={{fontSize:"20px"}}>{t.icon}</span>
            <span style={{fontSize:"10px",fontWeight:tab===i?700:500,color:tab===i?C.cyan:C.muted}}>{t.label}</span>
            {tab===i&&<div style={{width:"20px",height:"2px",background:C.cyan,borderRadius:"2px"}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

// PWA Install
let dp;
const banner=document.getElementById("install-banner");
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();dp=e;

});
document.getElementById("ibtn")&&document.getElementById("ibtn").addEventListener("click",async()=>{
  if(!dp)return;banner.style.display="none";

});
document.getElementById("cbtn")&&document.getElementById("cbtn").addEventListener("click",()=>{banner.style.display="none";});
window.addEventListener("appinstalled",()=>{if(banner)banner.style.display="none";});

// Inline Service Worker
if("serviceWorker" in navigator){
  const sw=`
    const C="fw-v1";
    self.addEventListener("install",e=>{self.skipWaiting();});
    self.addEventListener("activate",e=>{self.clients.claim();});
    self.addEventListener("fetch",e=>{
      if(e.request.method!=="GET")return;
      e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
    });
  `;
  const blob=new Blob([sw],{type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:"./"}).catch(()=>{});
}
