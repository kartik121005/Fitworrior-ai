function getRank(s){
  if(s>=23)return{rank:"S",label:"Excellent",color:C.cyan};
  if(s>=20)return{rank:"A",label:"Very Good",color:C.green};
  if(s>=15)return{rank:"B",label:"Good",color:C.yellow};
  if(s>=10)return{rank:"C",label:"Needs Improvement",color:C.orange};
  return{rank:"D",label:"Poor",color:"#FF4444"};
}

function ExerciseDetail({exercise,muscleName,onBack}){
  const[step,setStep]=useState(0);
  const[showMistakes,setShowMistakes]=useState(false);
  const dc={Beginner:C.green,Intermediate:C.yellow,Advanced:C.orange};
  return(
    <div style={{padding:"16px",minHeight:"100vh"}}>
      <button onClick={onBack} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,padding:"8px 16px",borderRadius:"8px",cursor:"pointer",marginBottom:"16px",fontSize:"13px"}}>← Back</button>
      <div style={{background:C.card,borderRadius:"16px",padding:"20px",marginBottom:"12px",border:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"6px"}}>
          <h2 style={{color:C.text,fontSize:"22px",fontWeight:800,margin:0}}>{exercise.name}</h2>
          <span style={{background:dc[exercise.difficulty]+"22",color:dc[exercise.difficulty],padding:"4px 10px",borderRadius:"20px",fontSize:"11px",fontWeight:700}}>{exercise.difficulty}</span>
        </div>
        <p style={{color:C.cyan,fontSize:"13px",margin:"4px 0"}}>🎯 {exercise.target}</p>
        <p style={{color:C.muted,fontSize:"12px",margin:0}}>+ {exercise.secondary}</p>
      </div>
      <MuscleModel muscleName={muscleName}/>
      <div style={{background:C.card,borderRadius:"16px",padding:"20px",marginBottom:"12px",border:`1px solid ${C.border}`}}>
        <h3 style={{color:C.text,fontSize:"15px",fontWeight:700,marginBottom:"14px"}}>📋 Instructions</h3>
        {exercise.steps.map((s,i)=>(
          <div key={i} onClick={()=>setStep(i)} style={{display:"flex",gap:"12px",padding:"12px",borderRadius:"10px",marginBottom:"8px",cursor:"pointer",background:step===i?C.cyan+"18":"transparent",border:`1px solid ${step===i?C.cyan+"44":"transparent"}`,transition:"all 0.2s"}}>
            <span style={{background:step===i?C.cyan:C.border,color:step===i?C.bg:C.muted,borderRadius:"50%",width:"24px",height:"24px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:700,flexShrink:0}}>{i+1}</span>
            <span style={{color:step===i?C.text:C.muted,fontSize:"14px",lineHeight:1.5}}>{s}</span>
          </div>
        ))}
      </div>
      <div style={{background:C.card,borderRadius:"16px",padding:"20px",border:`1px solid ${C.orange}44`}}>

function Tab2(){
  const today=new Date().getDay();
  const todayIdx=today===0?6:today-1;
  const[activeDay,setActiveDay]=useState(todayIdx);
  const[completed,setCompleted]=useState({});
  const[weights,setWeights]=useState({});
  const dayData=SCHEDULE[activeDay];
  const allEx=dayData.workouts.flatMap(w=>w.exercises);
  const totalSets=allEx.reduce((a,e)=>a+e.sets,0);
  const doneSets=Object.values(completed).filter(Boolean).length;
  const pct=totalSets>0?Math.round((doneSets/totalSets)*100):0;
  function toggleSet(k){setCompleted(p=>({...p,[k]:!p[k]}))}
  return(
    <div style={{padding:"16px"}}>
      <h1 style={{color:C.text,fontSize:"24px",fontWeight:900,marginBottom:"16px"}}>Workout Plan</h1>
      <div style={{display:"flex",gap:"8px",marginBottom:"20px",overflowX:"auto",paddingBottom:"4px"}}>
        {SCHEDULE.map((d,i)=>(
          <button key={i} onClick={()=>{setActiveDay(i);setCompleted({});}} style={{background:activeDay===i?C.cyan:C.card,color:activeDay===i?C.bg:C.muted,border:`1px solid ${activeDay===i?C.cyan:C.border}`,borderRadius:"10px",padding:"8px 14px",cursor:"pointer",whiteSpace:"nowrap",fontWeight:activeDay===i?800:500,fontSize:"13px",transition:"all 0.2s"}}>{d.day}</button>
        ))}
      </div>
      <div style={{background:C.card,borderRadius:"14px",padding:"16px",marginBottom:"16px",border:`1px solid ${C.border}`}}>
        <h2 style={{color:C.text,fontSize:"18px",fontWeight:800,margin:"0 0 4px 0"}}>{dayData.day} — {dayData.focus}</h2>
        {totalSets>0&&(
          <div style={{marginTop:"12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}>
              <span style={{color:C.muted,fontSize:"12px"}}>Progress</span>
              <span style={{color:pct===100?C.green:C.cyan,fontSize:"12px",fontWeight:700}}>{pct}% {pct===100?"✓ Done!":""}</span>
            </div>
            <div style={{background:C.border,borderRadius:"4px",height:"6px"}}>
              <div style={{background:pct===100?`linear-gradient(90deg,${C.green},${C.cyan})`:`linear-gradient(90deg,${C.cyan},${C.green})`,height:"100%",borderRadius:"4px",width:`${pct}%`,transition:"width 0.3s"}}/>
            </div>
          </div>
        )}
      </div>
      {dayData.workouts.length===0?(
        <div style={{textAlign:"center",padding:"48px 24px"}}>
          <div style={{fontSize:"56px",marginBottom:"12px"}}>🧘</div>
          <div style={{color:C.text,fontSize:"18px",fontWeight:700}}>Recovery Day</div>
          <div style={{color:C.muted,fontSize:"14px",marginTop:"8px",lineHeight:1.6}}>Rest, stretch, and let your muscles rebuild. You earned it. 💪</div>
        </div>
      ):dayData.workouts.map((group,gi)=>(
        <div key={gi} style={{marginBottom:"20px"}}>
          <h3 style={{color:C.cyan,fontSize:"13px",fontWeight:700,marginBottom:"10px",textTransform:"uppercase",letterSpacing:"1px"}}>— {group.muscle} —</h3>
          {group.exercises.map((ex,ei)=>(
            <div key={ei} style={{background:C.card,borderRadius:"12px",padding:"16px",marginBottom:"10px",border:`1px solid ${C.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"12px"}}>
                <div>
                  <div style={{color:C.text,fontSize:"15px",fontWeight:700}}>{ex.name}</div>
                  <div style={{color:C.muted,fontSize:"12px"}}>{ex.sets} Sets × {ex.reps} {typeof ex.reps==="string"?"":""}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                  <input type="number" placeholder="kg" value={weights[`${gi}_${ei}`]||""} onChange={e=>setWeights(p=>({...p,[`${gi}_${ei}`]:e.target.value}))}
                    style={{background:C.card2,border:`1px solid ${C.border}`,color:C.text,borderRadius:"8px",padding:"6px 8px",width:"60px",fontSize:"14px",textAlign:"center"}}/>
                </div>
              </div>
              <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                {Array.from({length:ex.sets}).map((_,si)=>{
                  const k=`${gi}_${ei}_${si}`;
                  const done=completed[k];
                  return(
                    <button key={si} onClick={()=>toggleSet(k)} style={{background:done?C.green:C.card2,color:done?C.bg:C.muted,border:`1px solid ${done?C.green:C.border}`,borderRadius:"8px",padding:"7px 14px",cursor:"pointer",fontSize:"13px",fontWeight:700,transition:"all 0.2s"}}>
                      {done?"✓":"S"}{si+1}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function Tab4(){
  const[checked,setChecked]=useState({});
  const[aiCoach,setAiCoach]=useState("");
  const[loading,setLoading]=useState(false);
  const checkedMeals=DIET.filter(d=>checked[d.meal]);
  const totalCal=checkedMeals.reduce((a,d)=>a+d.cal,0);
  const totalProt=checkedMeals.reduce((a,d)=>a+d.protein,0);

  async function getCoach(){
    setLoading(true);setAiCoach("");
    try{
      const status=DIET.map(d=>`${d.meal}: ${checked[d.meal]?"Done":"Missed"}`).join(", ");
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:`You are FitWarrior AI Coach. Give a punchy, motivating daily report (3-4 sentences) for this user:\n- Meals done: ${checkedMeals.length}/8\n- Calories: ${totalCal}/2800 kcal\n- Protein: ${totalProt}/110g\n- Details: ${status}\nBe specific and energetic. ONE actionable tip for tomorrow. Use 1-2 emojis naturally. Keep it under 80 words.`}]})
      });
      const data=await res.json();
      setAiCoach(data.content?.[0]?.text||"Keep grinding! Consistency is the key to transformation. 💪");
    }catch{setAiCoach("Keep grinding! Consistency is the key to transformation. 💪");}
    setLoading(false);
  }

  return(
    <div style={{padding:"16px"}}>
      <h1 style={{color:C.text,fontSize:"24px",fontWeight:900,marginBottom:"4px"}}>Diet Planner</h1>
      <p style={{color:C.muted,fontSize:"13px",marginBottom:"16px"}}>50kg · Pure Veg · Muscle Gain · 2800 cal target</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"16px"}}>
        {[
          {label:"Calories",value:totalCal,target:2800,unit:"kcal",color:C.orange},
          {label:"Protein",value:totalProt,target:110,unit:"g",color:C.cyan},
        ].map((m,i)=>(
          <div key={i} style={{background:C.card,borderRadius:"14px",padding:"16px",border:`1px solid ${m.color}33`}}>
            <div style={{color:m.color,fontSize:"24px",fontWeight:900}}>{m.value}</div>
            <div style={{color:C.muted,fontSize:"12px"}}>/ {m.target} {m.unit}</div>
            <div style={{background:C.border,borderRadius:"4px",height:"4px",marginTop:"8px"}}>
              <div style={{background:m.color,height:"100%",borderRadius:"4px",width:`${Math.min((m.value/m.target)*100,100)}%`,transition:"width 0.3s"}}/>
            </div>
          </div>
        ))}
      </div>
      {DIET.map((meal,i)=>(
        <div key={i} onClick={()=>setChecked(p=>({...p,[meal.meal]:!p[meal.meal]}))} style={{background:checked[meal.meal]?C.green+"12":C.card,border:`1px solid ${checked[meal.meal]?C.green+"44":C.border}`,borderRadius:"14px",padding:"14px 16px",marginBottom:"10px",cursor:"pointer",transition:"all 0.2s"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>
              <span style={{fontSize:"22px"}}>{meal.icon}</span>
              <div>
                <div style={{color:C.text,fontSize:"15px",fontWeight:700}}>{meal.meal}</div>
                <div style={{color:C.muted,fontSize:"11px",marginBottom:"4px"}}>{meal.time}</div>
                {meal.items.map((item,j)=><div key={j} style={{color:C.muted,fontSize:"12px"}}>• {item}</div>)}
              </div>
            </div>
            <div style={{textAlign:"right",flexShrink:0,marginLeft:"8px"}}>
              <div style={{color:checked[meal.meal]?C.green:C.border,fontSize:"22px",marginBottom:"4px"}}>{checked[meal.meal]?"✓":"○"}</div>
              {meal.cal>0&&<div style={{color:C.orange,fontSize:"12px",fontWeight:700}}>{meal.cal} cal</div>}
              {meal.protein>0&&<div style={{color:C.cyan,fontSize:"11px"}}>{meal.protein}g protein</div>}
              <span style={{background:C.cyan+"22",color:C.cyan,padding:"2px 6px",borderRadius:"8px",fontSize:"10px",fontWeight:700}}>{meal.tag}</span>
            </div>
          </div>
        </div>
      ))}
      <div style={{background:`linear-gradient(135deg,${C.purple}18,${C.card})`,borderRadius:"16px",padding:"20px",marginTop:"8px",border:`1px solid ${C.purple}44`}}>
        <h3 style={{color:C.purple,fontSize:"15px",fontWeight:700,marginBottom:"12px"}}>🤖 AI Coach Report</h3>
        {aiCoach?(
          <p style={{color:C.text,fontSize:"14px",lineHeight:1.6,margin:"0 0 12px 0"}}>{aiCoach}</p>
        ):(
          <p style={{color:C.muted,fontSize:"13px",margin:"0 0 12px 0"}}>Log your meals then tap below for a personalized AI coach report.</p>
        )}
        <button onClick={getCoach} disabled={loading} style={{background:loading?C.border:C.purple,color:loading?C.muted:"#fff",border:"none",borderRadius:"10px",padding:"12px 20px",cursor:loading?"not-allowed":"pointer",fontSize:"14px",fontWeight:700,width:"100%",transition:"all 0.2s"}}>
          {loading?"Analyzing your day...":"📊 Get AI Coach Report"}
        </button>
      </div>
    </div>
  );
}

function App(){
  const[tab,setTab]=useState(0);
  const tabs=[{icon:"🏛️",label:"Library"},{icon:"💪",label:"Workout"},{icon:"📊",label:"Stats"},{icon:"🥗",label:"Diet"}];
  return(
    <div style={{background:C.bg,minHeight:"100vh",maxWidth:"480px",margin:"0 auto",position:"relative",paddingBottom:"80px"}}>
      <div style={{background:C.bg,borderBottom:`1px solid ${C.border}`,padding:"14px 16px 10px",position:"sticky",top:0,zIndex:10,backdropFilter:"blur(10px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
          <span style={{fontSize:"22px"}}>⚔️</span>
          <span style={{color:C.cyan,fontSize:"18px",fontWeight:900,letterSpacing:"-0.5px"}}>FitWarrior<span style={{color:C.orange}}>AI</span></span>
          <span style={{marginLeft:"auto",background:C.cyan+"18",color:C.cyan,padding:"3px 10px",borderRadius:"20px",fontSize:"11px",fontWeight:700}}>WARRIOR</span>
        </div>
      </div>
      <div>
        {tab===0&&<Tab1/>}
        {tab===1&&<Tab2/>}
        {tab===2&&<Tab3/>}
        {tab===3&&<Tab4/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:C.card,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:20,paddingBottom:"env(safe-area-inset-bottom)"}}>
        {tabs.map((t,i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{flex:1,background:"none",border:"none",padding:"10px 0 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}>
            <span style={{fontSize:"20px"}}>{t.icon}</span>
            <span style={{fontSize:"10px",fontWeight:tab===i?700:500,color:tab===i?C.cyan:C.muted,transition:"color 0.2s"}}>{t.label}</span>
            {tab===i&&<div style={{width:"20px",height:"2px",background:C.cyan,borderRadius:"2px"}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
// Service Worker registration
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").then(r=>console.log("SW registered")).catch(e=>console.log("SW error",e));
  });
}

// PWA Install prompt
let deferredPrompt;
const banner=document.getElementById("install-banner");
const installBtn=document.getElementById("install-btn");
const closeBanner=document.getElementById("close-banner");

window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();
  deferredPrompt=e;
  setTimeout(()=>{banner.style.display="flex";},3000);
});

installBtn&&installBtn.addEventListener("click",async()=>{
  if(!deferredPrompt)return;
  banner.style.display="none";
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  deferredPrompt=null;
});

closeBanner&&closeBanner.addEventListener("click",()=>{banner.style.display="none";});

window.addEventListener("appinstalled",()=>{banner.style.display="none";deferredPrompt=null;});
</script>
